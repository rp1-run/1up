description: 1up search evaluation suite

prompts:
  - file://prompt.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: haiku
      betas: [fast-mode-2026-02-01]
      permission_mode: bypassPermissions
      allow_dangerously_skip_permissions: true
      max_turns: 100
      custom_allowed_tools: [Bash, Read]

defaultTest:
  options:
    provider:
      id: anthropic:claude-haiku-4-5-20251001
      config:
        temperature: 0

extensions:
  - file://../shared/extension.ts

tests:
  - description: Search Stack
    vars:
      TASK_PROMPT: >
        Trace how emdash content search is enabled and queried, from a field
        becoming searchable through to admin search results. Identify the key
        files involved in each step.
      EXPECTED_FILES: fts-manager.ts,query.ts,AdminCommandPalette.tsx,search.spec.ts
    assert:
      - type: javascript
        value: file://../shared/assertions/index.ts:assert1upUsed
      - type: javascript
        value: file://../shared/assertions/index.ts:assertNoFallbackTools
      - type: javascript
        value: |
          const expected = String(context.vars.EXPECTED_FILES).split(',').map(f => f.trim());
          const missing = expected.filter(f => !output.includes(f.split('/').pop() || f));
          const pass = missing.length === 0;
          return { pass, score: (expected.length - missing.length) / expected.length, reason: pass ? `Agent referenced all expected files: ${expected.join(', ')}` : `Agent missing references to: ${missing.join(', ')}` };
      - type: llm-rubric
        value: >
          Accuracy: Does the agent's answer correctly describe how content
          search works in emdash, including FTS indexing via fts-manager.ts,
          query execution via query.ts, admin search UI in
          AdminCommandPalette.tsx, and test coverage in search.spec.ts? Score
          based on factual correctness of the described code flow.
      - type: llm-rubric
        value: >
          Completeness: Does the agent trace the full path from a field
          becoming searchable through to admin search results? The answer
          should cover indexing setup, query execution, UI integration, and
          testing. Score based on coverage of the complete flow.
      - type: llm-rubric
        value: >
          Reasoning Quality: Is the explanation coherent, well-structured, and
          does it demonstrate understanding of how the search components
          connect? Score based on clarity and logical flow of the explanation.

  - description: WordPress Import
    vars:
      TASK_PROMPT: >
        Explain the WordPress import pipeline from the admin wizard through
        schema preparation, WXR execution, and Gutenberg-to-Portable-Text
        conversion. Identify the key files involved in each step.
      EXPECTED_FILES: WordPressImport.tsx,prepare.ts,execute.ts,gutenberg-to-portable-text/src/index.ts
    assert:
      - type: javascript
        value: file://../shared/assertions/index.ts:assert1upUsed
      - type: javascript
        value: file://../shared/assertions/index.ts:assertNoFallbackTools
      - type: javascript
        value: |
          const expected = String(context.vars.EXPECTED_FILES).split(',').map(f => f.trim());
          const missing = expected.filter(f => !output.includes(f.split('/').pop() || f));
          const pass = missing.length === 0;
          return { pass, score: (expected.length - missing.length) / expected.length, reason: pass ? `Agent referenced all expected files: ${expected.join(', ')}` : `Agent missing references to: ${missing.join(', ')}` };
      - type: llm-rubric
        value: >
          Accuracy: Does the agent's answer correctly describe the WordPress
          import pipeline, including the admin wizard in WordPressImport.tsx,
          schema preparation in prepare.ts, WXR execution in execute.ts, and
          Gutenberg-to-Portable-Text conversion in index.ts? Score based on
          factual correctness.
      - type: llm-rubric
        value: >
          Completeness: Does the agent trace the full import pipeline from
          wizard UI through preparation, execution, and content conversion?
          The answer should cover all four stages. Score based on coverage.
      - type: llm-rubric
        value: >
          Reasoning Quality: Is the explanation coherent, well-structured, and
          does it demonstrate understanding of how the import stages connect
          and transform data? Score based on clarity and logical flow.

  - description: Plugin Architecture
