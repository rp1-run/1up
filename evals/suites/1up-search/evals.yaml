      TASK_PROMPT: >
        Trace how a sandboxed emdash plugin is registered, capability-gated,
        loaded into Cloudflare Worker isolation, and given controlled access
        to content, storage, and network. Identify the key files involved in
        each step.
      EXPECTED_FILES: manager.ts,hooks.ts,runner.ts,wrapper.ts,bridge.ts
    assert:
      - type: javascript
        value: file://../shared/assertions/index.ts:assert1upUsed
      - type: javascript
        value: file://../shared/assertions/index.ts:assertNoFallbackTools
      - type: javascript
        value: |
          const expected = String(context.vars.EXPECTED_FILES).split(',').map(f => f.trim());
          const missing = expected.filter(f => !output.includes(f.split('/').pop() || f));
          const pass = missing.length === 0;
          return { pass, score: (expected.length - missing.length) / expected.length, reason: pass ? `Agent referenced all expected files: ${expected.join(', ')}` : `Agent missing references to: ${missing.join(', ')}` };
      - type: llm-rubric
        value: >
          Accuracy: Does the agent's answer correctly describe the plugin
          architecture, including registration in manager.ts, capability hooks
          in hooks.ts, Worker isolation in runner.ts, sandboxed wrapping in
          wrapper.ts, and bridge access in bridge.ts? Score based on factual
          correctness.
      - type: llm-rubric
        value: >
          Completeness: Does the agent trace the full plugin lifecycle from
          registration through capability gating, Worker isolation, and
          controlled resource access? The answer should cover all five
          architectural layers. Score based on coverage.
      - type: llm-rubric
        value: >
          Reasoning Quality: Is the explanation coherent, well-structured, and
          does it demonstrate understanding of the security boundaries and
          isolation mechanisms? Score based on clarity and logical flow.

