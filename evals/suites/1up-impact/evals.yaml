description: "1up impact evaluation: 1up impact vs baseline comparison"

evaluateOptions:
  maxConcurrency: 1

prompts:
  - id: file://prompt-1up.txt
    label: 1up
  - id: file://prompt-baseline.txt
    label: baseline

providers:
  - id: anthropic:claude-agent-sdk
    label: 1up-agent
    prompts: [1up]
    config:
      model: sonnet
      betas:
        - fast-mode-2026-02-01
      permission_mode: bypassPermissions
      allow_dangerously_skip_permissions: true
      max_turns: 100
      custom_allowed_tools:
        - Bash
        - Read
        - mcp__oneup__oneup_prepare
        - mcp__oneup__oneup_search
        - mcp__oneup__oneup_read
        - mcp__oneup__oneup_symbol
        - mcp__oneup__oneup_impact
      mcp:
        servers:
          - name: oneup
            command: 1up
            args: ["mcp", "--path", "."]

  - id: anthropic:claude-agent-sdk
    label: baseline-agent
    prompts: [baseline]
    config:
      model: sonnet
      betas:
        - fast-mode-2026-02-01
      permission_mode: bypassPermissions
      allow_dangerously_skip_permissions: true
      max_turns: 100
      custom_allowed_tools: [Bash, Read, Glob, Grep]

defaultTest:
  options:
    provider:
      id: anthropic:claude-haiku-4-5-20251001
      config:
        temperature: 0

extensions:
  - file://../shared/extension.ts:default

tests:
  - description: FTSManager Impact
    vars:
      TASK_PROMPT: >
        What files and functions would be affected if you changed the
        FTSManager class interface in emdash? Identify each affected file
        and explain why it would need to change.
      EXPECTED_FILES: query.ts,registry.ts,emdash-runtime.ts
    assert:
      - type: javascript
        value: |
          const expected = String(context.vars.EXPECTED_FILES).split(',').map(f => f.trim());
          const missing = expected.filter(f => !output.includes(f.split('/').pop() || f));
          const found = expected.length - missing.length;
          const score = found / expected.length;
          return { pass: true, score, reason: missing.length === 0 ? `Referenced all expected files: ${expected.join(', ')}` : `Found ${found}/${expected.length}. Missing: ${missing.join(', ')}` };
      - type: javascript
        value: file://../shared/assertions/index.ts:assert1upImpactUsed
      - type: javascript
        value: file://../shared/assertions/index.ts:assertImpactTrustInterpreted
      - type: javascript
        value: file://../shared/assertions/index.ts:assertNoFallbackTools
      - type: javascript
        value: file://../shared/assertions/index.ts:assertValidOneupMcpCalls
      - type: javascript
        value: file://../shared/assertions/index.ts:reportEfficiency
      - type: llm-rubric
        value: >
          Accuracy: FTSManager in fts-manager.ts creates FTS5 virtual tables
          and triggers for content search. Key downstream dependencies
          include: (1) query.ts instantiates FTSManager and calls its
          methods for search queries, (2) registry.ts calls FTSManager
          during rebuildSearchIndex, (3) emdash-runtime.ts instantiates
          FTSManager at startup. Score 1.0 if at least three direct
          consumers are correctly identified with reasoning about why
          they break. Score 0.5 if one or two are found. Score 0.0 if
          fundamentally wrong. Judge the quality of impact analysis,
          not format.
      - type: llm-rubric
        value: >
          Completeness: A thorough impact analysis should identify: (a) direct
          consumers that instantiate or call FTSManager methods, (b) API
          routes that use search functionality, (c) data import/seed paths
          that enable search. Score 1.0 if all three levels are covered,
          0.66 if two, 0.33 if one. Judge only coverage of the dependency
          chain.

  - description: Schema Registry Impact
    vars:
      TASK_PROMPT: >
        What would break if you changed how schema definitions are stored
        in registry.ts in the emdash codebase? Trace the blast radius
        through all dependent files.
      EXPECTED_FILES: emdash-runtime.ts,schema.ts,typegen.ts
    assert:
      - type: javascript
        value: |
          const expected = String(context.vars.EXPECTED_FILES).split(',').map(f => f.trim());
          const missing = expected.filter(f => !output.includes(f.split('/').pop() || f));
          const found = expected.length - missing.length;
          const score = found / expected.length;
          return { pass: true, score, reason: missing.length === 0 ? `Referenced all expected files: ${expected.join(', ')}` : `Found ${found}/${expected.length}. Missing: ${missing.join(', ')}` };
      - type: javascript
        value: file://../shared/assertions/index.ts:assert1upImpactUsed
      - type: javascript
        value: file://../shared/assertions/index.ts:assertImpactTrustInterpreted
      - type: javascript
        value: file://../shared/assertions/index.ts:assertNoFallbackTools
      - type: javascript
        value: file://../shared/assertions/index.ts:assertValidOneupMcpCalls
      - type: javascript
        value: file://../shared/assertions/index.ts:reportEfficiency
      - type: llm-rubric
        value: >
          Accuracy: registry.ts stores schema definitions in the database.
          Key dependents include: (1) emdash-runtime.ts creates a
          SchemaRegistry instance at startup, (2) api/handlers/schema.ts
          calls CRUD methods on the registry, (3) typegen.ts generates
          TypeScript types from schema definitions. Score 1.0 if at least
          three direct dependents are correctly identified with reasoning
          about why they break. Score 0.5 if one or two are found.
          Score 0.0 if fundamentally wrong. Judge the quality of impact
          reasoning.
      - type: llm-rubric
        value: >
          Completeness: The answer should trace impact through: (a) schema
          storage layer, (b) schema loading/runtime layer, (c) query
          execution layer, (d) API handlers or import/export paths.
          Score 1.0 if all four layers are covered, 0.75 if three,
          0.5 if two, 0.25 if one. Judge only depth of the dependency
          trace.

  - description: Plugin Runner Impact
    vars:
      TASK_PROMPT: >
        What is the blast radius of changing the plugin sandbox runner API
        in runner.ts in the emdash codebase? Identify all files that would
        need to change and explain the dependency chain.
      EXPECTED_FILES: emdash-runtime.ts,types.ts
    assert:
      - type: javascript
        value: |
          const expected = String(context.vars.EXPECTED_FILES).split(',').map(f => f.trim());
          const missing = expected.filter(f => !output.includes(f.split('/').pop() || f));
          const found = expected.length - missing.length;
          const score = found / expected.length;
          return { pass: true, score, reason: missing.length === 0 ? `Referenced all expected files: ${expected.join(', ')}` : `Found ${found}/${expected.length}. Missing: ${missing.join(', ')}` };
      - type: javascript
        value: file://../shared/assertions/index.ts:assert1upImpactUsed
      - type: javascript
        value: file://../shared/assertions/index.ts:assertImpactTrustInterpreted
      - type: javascript
        value: file://../shared/assertions/index.ts:assertNoFallbackTools
      - type: javascript
        value: file://../shared/assertions/index.ts:assertValidOneupMcpCalls
      - type: javascript
        value: file://../shared/assertions/index.ts:reportEfficiency
      - type: llm-rubric
        value: >
          Accuracy: runner.ts loads plugins into Cloudflare Worker isolation.
          Key dependencies include: (1) emdash-runtime.ts calls
          sandboxRunner.load() and plugin invoke methods like invokeHook()
          and invokeRoute(), (2) sandbox/types.ts defines the SandboxRunner
          and SandboxedPlugin interfaces that runner.ts implements,
          (3) virtual-modules.ts generates the sandbox runner import.
          Score 1.0 if at least two direct code dependencies are correctly
          identified with reasoning. Score 0.5 if one is found. Score 0.0
          if fundamentally wrong.
      - type: llm-rubric
        value: >
          Completeness: The answer should cover: (a) sandbox runtime and
          plugin loading, (b) type definitions and interface contracts,
          (c) runtime call sites that invoke sandbox methods, (d) module
          wiring or re-exports. Score 1.0 if all four, 0.75 if three,
          0.5 if two, 0.25 if one.
