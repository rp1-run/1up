name: publish-packages

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish package definitions for
        required: true
        type: string

permissions:
  contents: write

env:
  UPDATE_MANIFEST_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/update-manifest.json
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}

jobs:
  publish:
    name: publish Homebrew and Scoop definitions
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      PACKAGE_PUBLISH_TOKEN: ${{ secrets.PACKAGE_PUBLISH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: validate publish token
        shell: bash
        run: |
          if [[ -z "${PACKAGE_PUBLISH_TOKEN:-}" ]]; then
            echo "PACKAGE_PUBLISH_TOKEN is required to publish package definitions" >&2
            exit 1
          fi

      - name: download release manifest
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/release"

          for attempt in $(seq 1 60); do
            rm -f "${RUNNER_TEMP}/release/release-manifest.json"
            if gh release download "${RELEASE_TAG}" \
              --pattern release-manifest.json \
              --dir "${RUNNER_TEMP}/release" \
              --clobber >/dev/null 2>&1; then
              break
            fi

            echo "waiting for release-manifest.json for ${RELEASE_TAG} (attempt ${attempt}/60)" >&2
            sleep 20
          done

          test -f "${RUNNER_TEMP}/release/release-manifest.json"

      - name: render package definitions
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/rendered"
          bash scripts/release/render_homebrew_formula.sh \
            --manifest "${RUNNER_TEMP}/release/release-manifest.json" \
            --output "${RUNNER_TEMP}/rendered/1up.rb"
          bash scripts/release/render_scoop_manifest.sh \
            --manifest "${RUNNER_TEMP}/release/release-manifest.json" \
            --output "${RUNNER_TEMP}/rendered/1up.json"

      - name: publish package definitions
        id: publish
        shell: bash
        run: |
          manifest_path="${RUNNER_TEMP}/release/release-manifest.json"
          version=$(jq -r '.version' "$manifest_path")
          homebrew_repo=$(jq -r '.channels.homebrew_tap' "$manifest_path")
          scoop_repo=$(jq -r '.channels.scoop_bucket' "$manifest_path")

          publish_repo() {
            local repo="$1"
            local relative_path="$2"
            local source_path="$3"
            local workdir="$4"
            local branch_name

            git clone "https://x-access-token:${PACKAGE_PUBLISH_TOKEN}@github.com/${repo}.git" "$workdir" >&2
            git -C "$workdir" config user.name "github-actions[bot]"
            git -C "$workdir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            mkdir -p "$(dirname "$workdir/$relative_path")"
            cp "$source_path" "$workdir/$relative_path"

            git -C "$workdir" add "$relative_path"

            if git -C "$workdir" diff --cached --quiet; then
              git -C "$workdir" rev-parse HEAD
              return
            fi

            branch_name=$(git -C "$workdir" branch --show-current)
            git -C "$workdir" commit -m "1up ${version}" >&2
            git -C "$workdir" push origin "HEAD:${branch_name}" >&2
            git -C "$workdir" rev-parse HEAD
          }

          homebrew_commit=$(publish_repo "$homebrew_repo" "Formula/1up.rb" "${RUNNER_TEMP}/rendered/1up.rb" "${RUNNER_TEMP}/homebrew-tap")
          scoop_commit=$(publish_repo "$scoop_repo" "bucket/1up.json" "${RUNNER_TEMP}/rendered/1up.json" "${RUNNER_TEMP}/scoop-bucket")

          {
            echo "homebrew_commit=${homebrew_commit}"
            echo "scoop_commit=${scoop_commit}"
          } >> "$GITHUB_OUTPUT"

      - name: write package publication record
        shell: bash
        run: |
          bash scripts/release/write_package_publication_record.sh \
            --manifest "${RUNNER_TEMP}/release/release-manifest.json" \
            --homebrew-commit "${{ steps.publish.outputs.homebrew_commit }}" \
            --scoop-commit "${{ steps.publish.outputs.scoop_commit }}" \
            --output "${RUNNER_TEMP}/release/package-publication-record.json"

      - name: upload package publication record to release
        shell: bash
        run: |
          gh release upload "${RELEASE_TAG}" \
            "${RUNNER_TEMP}/release/package-publication-record.json" \
            --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: package-publication-record
          path: ${{ runner.temp }}/release/package-publication-record.json
          if-no-files-found: error

  publish-update-manifest:
    name: publish update manifest to main
    runs-on: ubuntu-24.04
    needs: publish
    env:
      GH_TOKEN: ${{ secrets.RELEASE_PAT }}
      RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
    steps:
      - name: validate release pat
        shell: bash
        run: |
          if [[ -z "${RELEASE_PAT:-}" ]]; then
            echo "RELEASE_PAT is required to publish update-manifest.json to main" >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.RELEASE_PAT }}

      - name: download release manifest
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/release"

          for attempt in $(seq 1 60); do
            rm -f "${RUNNER_TEMP}/release/release-manifest.json"
            if gh release download "${RELEASE_TAG}" \
              --pattern release-manifest.json \
              --dir "${RUNNER_TEMP}/release" \
              --clobber >/dev/null 2>&1; then
              break
            fi

            echo "waiting for release-manifest.json for ${RELEASE_TAG} (attempt ${attempt}/60)" >&2
            sleep 20
          done

          test -f "${RUNNER_TEMP}/release/release-manifest.json"

      - name: generate update manifest
        shell: bash
        run: |
          jq '{
            version,
            git_tag,
            published_at,
            notes_url,
            artifacts: [.artifacts[] | {target, archive, sha256, url}],
            channels,
            yanked,
            minimum_safe_version,
            message
          }' "${RUNNER_TEMP}/release/release-manifest.json" > update-manifest.json

      - name: commit and push update manifest
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add update-manifest.json
          if git diff --cached --quiet; then
            echo "update-manifest.json is unchanged, skipping commit" >&2
            exit 0
          fi
          version=$(jq -r '.version' update-manifest.json)
          git commit -m "chore: publish update manifest for v${version}"
          git push origin HEAD:main

  verify-update-manifest:
    name: verify stable update manifest
    runs-on: ubuntu-24.04
    needs: publish-update-manifest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: download release manifest
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/release"
          gh release download "${RELEASE_TAG}" \
            --pattern release-manifest.json \
            --dir "${RUNNER_TEMP}/release"

      - name: wait for stable update manifest
        shell: bash
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error --location "${UPDATE_MANIFEST_URL}" \
              --output "${RUNNER_TEMP}/update-manifest.json"; then
              break
            fi
            rm -f "${RUNNER_TEMP}/update-manifest.json"
            echo "waiting for ${UPDATE_MANIFEST_URL} (attempt ${attempt}/30)" >&2
            sleep 10
          done
          test -f "${RUNNER_TEMP}/update-manifest.json"

      - name: verify stable update manifest matches release
        shell: bash
        run: |
          jq -S '{
            version,
            git_tag,
            published_at,
            notes_url,
            artifacts: [.artifacts[] | {target, archive, sha256, url}],
            channels,
            yanked,
            minimum_safe_version,
            message
          }' "${RUNNER_TEMP}/release/release-manifest.json" > "${RUNNER_TEMP}/expected-update-manifest.json"
          jq -S . "${RUNNER_TEMP}/update-manifest.json" > "${RUNNER_TEMP}/actual-update-manifest.json"
          diff -u "${RUNNER_TEMP}/expected-update-manifest.json" "${RUNNER_TEMP}/actual-update-manifest.json"
