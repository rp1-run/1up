name: release-evidence

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to evaluate
        required: true
        type: string
      eval_summary_asset:
        description: Existing release asset name containing an eval summary
        required: false
        type: string
      eval_skipped_reason:
        description: Explicit reason to record when no eval summary asset is available
        required: false
        default: Hosted eval artifacts are not retained for this release candidate.
        type: string
      benchmark_skipped_reason:
        description: Optional reason to skip release benchmark generation
        required: false
        type: string

permissions:
  actions: read
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  verify-archives:
    name: verify archive ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: validate release tag
        shell: bash
        run: |
          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "unable to resolve release tag" >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 1

      - name: download archive under test
        shell: bash
        run: |
          release_dir="${RUNNER_TEMP}/release"
          mkdir -p "$release_dir"

          for attempt in $(seq 1 30); do
            rm -f "$release_dir/release-manifest.json"
            if gh release download "${RELEASE_TAG}" --pattern release-manifest.json --dir "$release_dir" --clobber >/dev/null 2>&1; then
              break
            fi

            echo "waiting for release-manifest.json for ${RELEASE_TAG} (attempt ${attempt}/30)" >&2
            sleep 20
          done

          test -f "$release_dir/release-manifest.json"
          gh release download "${RELEASE_TAG}" --pattern SHA256SUMS --dir "$release_dir" --clobber

          archive=$(jq -r --arg target "${{ matrix.target }}" '
            .artifacts[]
            | select(.target == $target)
            | .archive
          ' "$release_dir/release-manifest.json")

          if [[ -z "$archive" || "$archive" == "null" ]]; then
            echo "release manifest does not contain an archive for ${{ matrix.target }}" >&2
            exit 1
          fi

          gh release download "${RELEASE_TAG}" --pattern "$archive" --dir "$release_dir" --clobber

      - name: verify downloaded archive
        shell: bash
        run: |
          bash scripts/release/verify_release_archives.sh \
            --manifest "${RUNNER_TEMP}/release/release-manifest.json" \
            --assets-dir "${RUNNER_TEMP}/release" \
            --checksums "${RUNNER_TEMP}/release/SHA256SUMS" \
            --target "${{ matrix.target }}" \
            --output "${RUNNER_TEMP}/archive-verification-${{ matrix.target }}.json"

      - uses: actions/upload-artifact@v4
        with:
          name: archive-verification-${{ matrix.target }}
          path: ${{ runner.temp }}/archive-verification-${{ matrix.target }}.json
          if-no-files-found: error
          retention-days: 30

  evidence:
    name: generate release evidence
    runs-on: ubuntu-24.04
    needs:
      - verify-archives
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: validate release tag
        shell: bash
        run: |
          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "unable to resolve release tag" >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: install release evidence dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y hyperfine rsync unzip jq
          cargo install --locked cargo-audit

      - name: download release assets
        shell: bash
        run: |
          release_dir="${RUNNER_TEMP}/release"
          mkdir -p "$release_dir"

          for attempt in $(seq 1 30); do
            rm -f "$release_dir/release-manifest.json"
            if gh release download "${RELEASE_TAG}" --pattern release-manifest.json --dir "$release_dir" --clobber >/dev/null 2>&1; then
              break
            fi

            echo "waiting for release-manifest.json for ${RELEASE_TAG} (attempt ${attempt}/30)" >&2
            sleep 20
          done

          test -f "$release_dir/release-manifest.json"
          gh release download "${RELEASE_TAG}" --pattern SHA256SUMS --dir "$release_dir" --clobber
          gh release download "${RELEASE_TAG}" --pattern package-publication-record.json --dir "$release_dir" --clobber >/dev/null 2>&1 || true

      - name: locate merge gate run
        shell: bash
        run: |
          evidence_dir="${RUNNER_TEMP}/evidence"
          mkdir -p "$evidence_dir"

          commit_sha=$(jq -r '.commit_sha' "${RUNNER_TEMP}/release/release-manifest.json")
          repo="${GITHUB_REPOSITORY}"

          for attempt in $(seq 1 20); do
            run_json=$(gh api "/repos/${repo}/actions/workflows/ci.yml/runs?head_sha=${commit_sha}&per_page=20")
            selected_run=$(jq -c '[.workflow_runs[] | select(.status == "completed")] | sort_by(.run_number) | last // empty' <<<"$run_json")

            if [[ -n "$selected_run" && "$selected_run" != "null" ]]; then
              conclusion=$(jq -r '.conclusion' <<<"$selected_run")
              if [[ "$conclusion" != "success" ]]; then
                echo "ci workflow for ${commit_sha} completed with ${conclusion}" >&2
                exit 1
              fi

              jq -n \
                --argjson run "$selected_run" \
                '{
                  workflow: "ci",
                  run_id: $run.id,
                  run_number: $run.run_number,
                  run_url: $run.html_url,
                  head_sha: $run.head_sha,
                  conclusion: $run.conclusion,
                  required_checks: [
                    "security-check",
                    "release-smoke-macos",
                    "release-smoke-linux",
                    "release-smoke-windows",
                    "release-consistency"
                  ]
                }' \
                > "${evidence_dir}/merge-gate.json"
              exit 0
            fi

            echo "waiting for a completed ci workflow run for ${commit_sha} (attempt ${attempt}/20)" >&2
            sleep 15
          done

          echo "unable to locate a completed ci workflow for ${commit_sha}" >&2
          exit 1

      - name: download retained security check
        shell: bash
        run: |
          bash scripts/release/download_retained_security_check.sh \
            --repo "${GITHUB_REPOSITORY}" \
            --run-id "$(jq -r '.run_id' "${RUNNER_TEMP}/evidence/merge-gate.json")" \
            --output "${RUNNER_TEMP}/evidence/security-check.json"

      - uses: actions/download-artifact@v4
        with:
          pattern: archive-verification-*
          path: ${{ runner.temp }}/archive-verification-parts
          merge-multiple: true

      - name: merge archive verification summaries
        shell: bash
        run: |
          evidence_dir="${RUNNER_TEMP}/evidence"
          parts_dir="${RUNNER_TEMP}/archive-verification-parts"
          mkdir -p "$evidence_dir"

          mapfile -t parts < <(find "$parts_dir" -type f -name '*.json' | sort)
          if [[ "${#parts[@]}" -eq 0 ]]; then
            echo "no archive verification parts were downloaded" >&2
            exit 1
          fi

          jq -s \
            --arg generated_at "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg manifest_asset "$(basename "${RUNNER_TEMP}/release/release-manifest.json")" \
            --arg checksums_asset "$(basename "${RUNNER_TEMP}/release/SHA256SUMS")" \
            '{
              generated_at: $generated_at,
              manifest_asset: $manifest_asset,
              checksums_asset: $checksums_asset,
              archive_count: ([.[] | .archives | length] | add),
              archives: ([.[] | .archives[]] | sort_by(.target))
            }' \
            "${parts[@]}" \
            > "${evidence_dir}/archive-verification.json"

          expected_count=$(jq -r '.artifacts | length' "${RUNNER_TEMP}/release/release-manifest.json")
          actual_count=$(jq -r '.archive_count' "${evidence_dir}/archive-verification.json")
          unique_target_count=$(jq -r '[.archives[].target] | unique | length' "${evidence_dir}/archive-verification.json")

          if [[ "$actual_count" -ne "$expected_count" ]]; then
            echo "archive verification count ${actual_count} does not match manifest count ${expected_count}" >&2
            exit 1
          fi

          if [[ "$unique_target_count" -ne "$expected_count" ]]; then
            echo "archive verification summary contains duplicate or missing targets" >&2
            exit 1
          fi

      - name: resolve eval evidence
        id: eval
        shell: bash
        run: |
          evidence_dir="${RUNNER_TEMP}/evidence"
          asset_name="${{ inputs.eval_summary_asset }}"
          skipped_reason="${{ inputs.eval_skipped_reason }}"

          if [[ -n "$asset_name" ]] && gh release download "${RELEASE_TAG}" --pattern "$asset_name" --dir "$evidence_dir" --clobber >/dev/null 2>&1; then
            echo "summary_path=${evidence_dir}/${asset_name}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${skipped_reason//[[:space:]]/}" ]]; then
            skipped_reason="Hosted eval artifacts are not retained for this release candidate."
          fi

          echo "skipped_reason=${skipped_reason}" >> "$GITHUB_OUTPUT"

      - name: generate benchmark evidence
        id: benchmark
        shell: bash
        run: |
          evidence_dir="${RUNNER_TEMP}/evidence"
          skipped_reason="${{ inputs.benchmark_skipped_reason }}"

          if [[ -n "${skipped_reason//[[:space:]]/}" ]]; then
            echo "skipped_reason=${skipped_reason}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          out_dir="${RUNNER_TEMP}/benchmark"
          OUT_DIR="$out_dir" bash scripts/benchmark_parallel_indexing.sh "$GITHUB_WORKSPACE"
          cp "$out_dir/summary.json" "$evidence_dir/benchmark-summary.json"
          echo "summary_path=${evidence_dir}/benchmark-summary.json" >> "$GITHUB_OUTPUT"

      - name: generate release evidence
        shell: bash
        run: |
          args=(
            --manifest "${RUNNER_TEMP}/release/release-manifest.json"
            --merge-gate "${RUNNER_TEMP}/evidence/merge-gate.json"
            --security-check "${RUNNER_TEMP}/evidence/security-check.json"
            --archive-verification "${RUNNER_TEMP}/evidence/archive-verification.json"
            --output "${RUNNER_TEMP}/evidence/release-evidence.json"
          )

          if [[ -n "${{ steps.eval.outputs.summary_path }}" ]]; then
            args+=(--eval-summary "${{ steps.eval.outputs.summary_path }}")
          else
            args+=(--eval-skipped-reason "${{ steps.eval.outputs.skipped_reason }}")
          fi

          if [[ -n "${{ steps.benchmark.outputs.summary_path }}" ]]; then
            args+=(--benchmark-summary "${{ steps.benchmark.outputs.summary_path }}")
          else
            args+=(--benchmark-skipped-reason "${{ steps.benchmark.outputs.skipped_reason }}")
          fi

          if [[ -f "${RUNNER_TEMP}/release/package-publication-record.json" ]]; then
            args+=(--package-record "${RUNNER_TEMP}/release/package-publication-record.json")
          fi

          bash scripts/release/generate_release_evidence.sh "${args[@]}"

      - name: bundle release evidence
        shell: bash
        run: |
          tar -C "${RUNNER_TEMP}/evidence" \
            -czf "${RUNNER_TEMP}/release-evidence-bundle.tar.gz" \
            .

      - name: upload release evidence to draft release
        shell: bash
        run: |
          gh release upload "${RELEASE_TAG}" \
            "${RUNNER_TEMP}/evidence/security-check.json" \
            "${RUNNER_TEMP}/evidence/archive-verification.json" \
            "${RUNNER_TEMP}/evidence/release-evidence.json" \
            "${RUNNER_TEMP}/release-evidence-bundle.tar.gz" \
            --clobber

          if [[ -f "${RUNNER_TEMP}/evidence/benchmark-summary.json" ]]; then
            gh release upload "${RELEASE_TAG}" \
              "${RUNNER_TEMP}/evidence/benchmark-summary.json" \
              --clobber
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: release-evidence-${{ env.RELEASE_TAG }}
          path: |
            ${{ runner.temp }}/evidence/*
            ${{ runner.temp }}/release-evidence-bundle.tar.gz
          if-no-files-found: error
          retention-days: 30
