name: release-assets

on:
  push:
    tags:
      - "v*.*.*"
      - "oneup-v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and publish assets for
        required: true
        type: string

permissions:
  contents: write

env:
  UPDATE_MANIFEST_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/update-manifest.json
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  validate:
    name: validate release metadata
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - id: version
        shell: bash
        run: |
          version=$(awk -F'"' '
            /^\[package\]$/ { in_package = 1; next }
            /^\[/ && in_package { exit }
            in_package && /^version[[:space:]]*=/ { print $2; exit }
          ' Cargo.toml)
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: validate release metadata
        shell: bash
        run: bash scripts/release/validate_release_metadata.sh "${RELEASE_TAG}"

  build:
    name: build ${{ matrix.target }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            target: aarch64-apple-darwin
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: build release binary
        env:
          ONEUP_UPDATE_MANIFEST_URL: ${{ env.UPDATE_MANIFEST_URL }}
        shell: bash
        run: cargo build --locked --release --target "${{ matrix.target }}" --bin 1up

      - name: stage Windows ONNX Runtime DLL
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $archiveUrl = 'https://github.com/microsoft/onnxruntime/releases/download/v1.24.2/onnxruntime-win-x64-1.24.2.zip'
          $archiveSha256 = '8e3e9c826375352e29cb2614fe44f3d7a4b0ff7b8028ad7a456af9d949a7e8b0'
          $archivePath = Join-Path $env:RUNNER_TEMP 'onnxruntime-windows.zip'
          $extractRoot = Join-Path $env:RUNNER_TEMP 'onnxruntime-windows'
          $targetDir = 'target/${{ matrix.target }}/release'

          Invoke-WebRequest -Uri $archiveUrl -OutFile $archivePath

          $actualSha256 = (Get-FileHash -Algorithm SHA256 $archivePath).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $archiveSha256) {
            throw "unexpected ONNX Runtime archive hash: $actualSha256"
          }

          if (Test-Path $extractRoot) {
            Remove-Item $extractRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $extractRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null

          Expand-Archive -LiteralPath $archivePath -DestinationPath $extractRoot -Force
          $dllPath = Get-ChildItem $extractRoot -Filter 'onnxruntime.dll' -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $dllPath) {
            throw 'onnxruntime.dll not found in extracted payload'
          }

          Copy-Item $dllPath (Join-Path $targetDir 'onnxruntime.dll') -Force

      - name: package release asset
        shell: bash
        run: |
          binary_path="target/${{ matrix.target }}/release/1up"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            binary_path="${binary_path}.exe"
          fi
          bash scripts/release/package_release_asset.sh \
            --target "${{ matrix.target }}" \
            --binary "$binary_path" \
            --output-dir "${RUNNER_TEMP}/release-assets" \
            --version "${{ needs.validate.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ runner.temp }}/release-assets/*
          if-no-files-found: error

  publish-draft:
    name: publish draft release assets
    runs-on: ubuntu-24.04
    needs:
      - validate
      - build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/downloads

      - name: consolidate release artifacts
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/dist"
          find "${RUNNER_TEMP}/downloads" -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.metadata.json' \) -exec cp {} "${RUNNER_TEMP}/dist/" \;
          # Publish the install script as a release asset so
          # https://github.com/<repo>/releases/latest/download/setup.sh always
          # resolves to the current tag's copy (stable 302 redirect target).
          cp scripts/install/setup.sh "${RUNNER_TEMP}/dist/setup.sh"

      - name: generate checksums and manifest
        shell: bash
        run: |
          commit_sha=$(git rev-parse HEAD)
          bash scripts/release/write_sha256sums.sh \
            --assets-dir "${RUNNER_TEMP}/dist" \
            --output "${RUNNER_TEMP}/dist/SHA256SUMS"
          bash scripts/release/generate_release_manifest.sh \
            --tag "${RELEASE_TAG}" \
            --assets-dir "${RUNNER_TEMP}/dist" \
            --checksums "${RUNNER_TEMP}/dist/SHA256SUMS" \
            --output "${RUNNER_TEMP}/dist/release-manifest.json" \
            --commit-sha "${commit_sha}"
          bash scripts/release/extract_release_notes.sh "${RELEASE_TAG}" > "${RUNNER_TEMP}/dist/release-notes.md"

      - name: create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${RELEASE_TAG}"
          title="1up ${{ needs.validate.outputs.version }}"
          release_json=""

          for attempt in $(seq 1 12); do
            if release_json=$(gh release view "$tag" --json isDraft,url 2>/dev/null); then
              break
            fi

            release_json=""
            echo "waiting for existing release ${tag} (attempt ${attempt}/12)" >&2
            sleep 10
          done

          if [[ -n "$release_json" ]]; then
            gh release edit "$tag" \
              --title "$title" \
              --notes-file "${RUNNER_TEMP}/dist/release-notes.md"
          else
            gh release create "$tag" \
              --draft \
              --verify-tag \
              --title "$title" \
              --notes-file "${RUNNER_TEMP}/dist/release-notes.md"
          fi
          gh release upload "$tag" \
            "${RUNNER_TEMP}/dist/"*.tar.gz \
            "${RUNNER_TEMP}/dist/"*.zip \
            "${RUNNER_TEMP}/dist/SHA256SUMS" \
            "${RUNNER_TEMP}/dist/release-manifest.json" \
            "${RUNNER_TEMP}/dist/setup.sh" \
            --clobber
