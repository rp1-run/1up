name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-check:
    name: security-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: cache cargo-audit binary
        id: cache-cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        shell: bash
        run: cargo install --locked cargo-audit

      - name: run security gate
        shell: bash
        run: bash scripts/security_check.sh

      - name: retain security evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-check
          path: target/security/security-check.json
          if-no-files-found: error
          retention-days: 30

  release-smoke-macos:
    name: release-smoke-macos
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: cache rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-release-

      - name: build release binary
        shell: bash
        run: cargo build --locked --release --bin 1up

  release-smoke-linux:
    name: release-smoke-linux
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: cache rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-release-

      - name: build release binary
        shell: bash
        run: cargo build --locked --release --bin 1up

  release-smoke-windows:
    name: release-smoke-windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: cache rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-release-

      - name: build release binary
        shell: bash
        run: cargo build --locked --release --bin 1up

  release-consistency:
    name: release-consistency
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: validate release metadata surfaces
        shell: bash
        run: |
          version=$(awk -F'"' '
            /^\[package\]$/ { in_package = 1; next }
            /^\[/ && in_package { exit }
            in_package && /^version[[:space:]]*=/ { print $2; exit }
          ' Cargo.toml)
          bash scripts/release/validate_release_metadata.sh "v${version}"

  setup-script-lint:
    # Shell-only lint gates for scripts/install/setup.sh. Runs fast,
    # no Rust toolchain needed. REQ-011 (bash 3.2 compat) is covered by
    # running the script under a pinned bash 3.2 container; REQ-012
    # (shellcheck) runs natively on the Ubuntu runner.
    name: setup-script-lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        shell: bash
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi
          shellcheck --severity=style scripts/install/setup.sh

      - name: bash 3.2 compat smoke
        shell: bash
        run: |
          # Parse setup.sh under a pinned bash 3.2 image so macOS system bash
          # stays in the supported matrix. `bash -n` gives us a hard syntax
          # gate without needing network access at run time (REQ-011).
          docker run --rm \
            -v "$PWD:/s:ro" \
            bash:3.2 \
            bash -n /s/scripts/install/setup.sh

  setup-script-integration:
    # Black-box integration tests for scripts/install/setup.sh. The Linux
    # leg runs the suite under bash 5.x; the macOS leg runs the same suite
    # under macOS system bash, which is the canonical bash 3.2.x runtime
    # the script must support. Together they turn the parse-only bash 3.2
    # gate into a real fixture-backed runtime check.
    name: setup-script-integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: cache rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-setup-script-${{ hashFiles('Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-setup-script-

      - name: record bash version
        shell: bash
        run: bash --version

      - name: setup_script_tests
        shell: bash
        run: cargo test --locked --test setup_script_tests
