<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="128" height="128" shape-rendering="crispEdges">
  <!-- 1UP Mushroom - monochrome pixel art -->
  <!-- Cap -->
  <rect x="5" y="1" width="6" height="1" fill="#1a1a1a"/>
  <rect x="3" y="2" width="10" height="1" fill="#1a1a1a"/>
  <rect x="2" y="3" width="12" height="1" fill="#1a1a1a"/>
  <rect x="2" y="4" width="12" height="1" fill="#1a1a1a"/>
  <rect x="1" y="5" width="14" height="1" fill="#1a1a1a"/>
  <rect x="1" y="6" width="14" height="1" fill="#1a1a1a"/>
  <rect x="1" y="7" width="14" height="1" fill="#1a1a1a"/>
  <rect x="2" y="8" width="12" height="1" fill="#1a1a1a"/>
  <!-- White spots on cap -->
  <rect x="4" y="3" width="3" height="1" fill="#ffffff"/>
  <rect x="3" y="4" width="4" height="1" fill="#ffffff"/>
  <rect x="3" y="5" width="4" height="1" fill="#ffffff"/>
  <rect x="4" y="6" width="3" height="1" fill="#ffffff"/>
  <rect x="10" y="3" width="3" height="1" fill="#ffffff"/>
  <rect x="10" y="4" width="3" height="1" fill="#ffffff"/>
  <rect x="10" y="5" width="3" height="1" fill="#ffffff"/>
  <rect x="10" y="6" width="3" height="1" fill="#ffffff"/>
  <!-- Stem -->
  <rect x="3" y="9" width="10" height="1" fill="#e8e8e8"/>
  <rect x="3" y="10" width="10" height="1" fill="#e8e8e8"/>
  <rect x="3" y="11" width="10" height="1" fill="#e8e8e8"/>
  <rect x="4" y="12" width="8" height="1" fill="#e8e8e8"/>
  <rect x="4" y="13" width="8" height="1" fill="#e8e8e8"/>
  <!-- Eyes -->
  <rect x="5" y="10" width="2" height="2" fill="#1a1a1a"/>
  <rect x="9" y="10" width="2" height="2" fill="#1a1a1a"/>
</svg>
